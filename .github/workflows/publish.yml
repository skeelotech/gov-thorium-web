name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*-gov.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gov

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@skeelotech'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Write .npmrc with resolved token for pnpm
        env:
          GH_PAT: ${{ secrets.GOV_GH_PACKAGES_PAT }}
        run: |
          cat > .npmrc << EOF
          @skeelotech:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${GH_PAT}
          ignore-scripts=true
          @jsr:registry=https://npm.jsr.io/
          EOF

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build bundle
        run: pnpm bundle

      - name: Publish
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GOV_GH_PACKAGES_PAT }}
