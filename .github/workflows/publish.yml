name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*-gov.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gov

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@skeelotech'

      - name: Install pnpm
        run: npm install -g pnpm@10.11.1

      - name: Write resolved auth token to npmrc files
        env:
          GH_PAT: ${{ secrets.GOV_GH_PACKAGES_PAT }}
        run: |
          AUTH_LINE="//npm.pkg.github.com/:_authToken=$GH_PAT"
          SCOPE_LINE="@skeelotech:registry=https://npm.pkg.github.com"
          # Overwrite the setup-node temp npmrc with resolved token
          printf '%s\n%s\n' "$SCOPE_LINE" "$AUTH_LINE" > "$NPM_CONFIG_USERCONFIG"
          # Also write to home .npmrc for pnpm
          printf '%s\n%s\n' "$SCOPE_LINE" "$AUTH_LINE" >> "$HOME/.npmrc"
          # And to the project .npmrc
          printf '@skeelotech:registry=https://npm.pkg.github.com\n' > .npmrc
          printf '//npm.pkg.github.com/:_authToken=%s\n' "$GH_PAT" >> .npmrc
          printf 'block-exotic-subdeps=false\n' >> .npmrc
          printf '@jsr:registry=https://npm.jsr.io/\n' >> .npmrc

      - name: Debug pnpm config
        run: |
          pnpm --version
          pnpm config list
          cat .npmrc || true
          cat $HOME/.npmrc || true

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --config.block-exotic-subdeps=false --config.ignore-scripts=false

      - name: Build bundle
        run: pnpm bundle

      - name: Publish
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GOV_GH_PACKAGES_PAT }}
